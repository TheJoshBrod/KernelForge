[project]
name = "frontend"
version = "1.0.0"
description = "Jac client application: frontend"
entry-point = "main.jac"

[dependencies.npm]
jac-client-node = "1.0.4"
recharts = "latest"
sonner = "latest"
react-router-dom = "latest"
tailwindcss = "latest"
"@tailwindcss/vite" = "latest"
tailwind-merge = "latest"
clsx = "latest"
watchdog = "latest"

[dependencies.npm.dev]
"@jac-client/dev-deps" = "1.0.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[serve]
base_route_app = "app"


[plugins.client.vite]
plugins = ["tailwindcss()"]
lib_imports = ["import tailwindcss from '@tailwindcss/vite'"]

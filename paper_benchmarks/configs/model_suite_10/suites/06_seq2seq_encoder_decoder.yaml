suite_id: seq2seq_encoder_decoder_suite
benchmark_mode: e2e_model
description: Seq2seq encoder-decoder validation suite template.
workload_type: seq2seq_records
workload_path: /abs/path/to/frozen/seq2seq_records.jsonl
synthetic_workload: false
variants:
  - eager
  - torch_compile
  - kf_cast
stages:
  - load
  - compile
  - warmup
  - prefill
  - decode
  - total_generate
batch_sizes:
  - 1
shape_or_length_buckets:
  - bucket_id: src_short_tgt_short
    source_max_tokens: 128
    target_max_tokens: 64
  - bucket_id: src_long_tgt_medium
    source_max_tokens: 512
    target_max_tokens: 128
max_new_tokens: 128
warmup_runs: 1
timed_runs: 5
generation_mode: greedy
include_tokenization_in_timing: false
measure_prefill_decode_separately: true
device: cuda

suite_id: dynamic_shape_workload_suite
benchmark_mode: e2e_model
description: Dynamic-shape validation suite template.
workload_type: dynamic_shape_records
workload_path: /abs/path/to/frozen/dynamic_shape_records.jsonl
synthetic_workload: false
variants:
  - eager
  - torch_compile
  - kf_cast
stages:
  - load
  - compile
  - warmup
  - prefill
  - decode
  - total_generate
batch_sizes:
  - 1
shape_or_length_buckets:
  - bucket_id: short_dynamic
    min_tokens: 1
    max_tokens: 64
  - bucket_id: long_dynamic
    min_tokens: 65
    max_tokens: 1024
max_new_tokens: 128
warmup_runs: 1
timed_runs: 5
generation_mode: greedy
include_tokenization_in_timing: false
measure_prefill_decode_separately: true
device: cuda
